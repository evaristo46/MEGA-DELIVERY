<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGA DELIVERY - Adicionar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #1a1a1a;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.6em;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #ffd700;
        }

        h1 span {
            color: #ffd700;
        }

        .admin-badge {
            background: #ff4757;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
        }

        .card {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #0047ab;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            color: #cccccc;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #404040;
            border-radius: 8px;
            font-size: 14px;
            background: #1a1a1a;
            color: #ffffff;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0047ab;
        }

        /* Preview da imagem */
        .image-preview {
            width: 100%;
            height: 150px;
            background: #1a1a1a;
            border-radius: 8px;
            border: 2px dashed #404040;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview span {
            color: #666666;
            font-size: 0.9em;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-add {
            background: linear-gradient(135deg, #ffd700 0%, #ffb700 100%);
            color: #000000;
        }

        .btn-list {
            background: #0047ab;
            color: white;
            margin-top: 10px;
        }

        .estabelecimentos-cadastrados {
            margin-top: 20px;
        }

        .estabelecimento-item {
            background: #2d2d2d;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #404040;
        }

        .estabelecimento-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .estabelecimento-info {
            flex: 1;
        }

        .estabelecimento-info h3 {
            color: #ffffff;
            font-size: 1em;
            margin-bottom: 5px;
        }

        .estabelecimento-info p {
            color: #888888;
            font-size: 0.85em;
        }

        .btn-excluir {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center;">
            <span class="admin-badge">🔧 MODO ADMIN</span>
        </div>
        
        <h1>🛵 MEGA <span>DELIVERY</span></h1>

        <div class="card">
            <h2>➕ Adicionar Estabelecimento</h2>
            
            <div class="form-group">
                <label>Foto do Estabelecimento</label>
                <div class="image-preview" id="imagePreview" onclick="document.getElementById('foto').click()">
                    <span>Clique para adicionar foto</span>
                </div>
                <input type="file" id="foto" accept="image/*" style="display: none;" onchange="previewImage()">
            </div>

            <div class="form-group">
                <label>Nome do Estabelecimento</label>
                <input type="text" id="nome" placeholder="Ex: Lanches Mega">
            </div>

            <div class="form-group">
                <label>📞 Telefone</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999">
            </div>

            <div class="form-group">
                <label>💬 WhatsApp</label>
                <input type="tel" id="whatsapp" placeholder="5511999999999">
            </div>

            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="contato@email.com">
            </div>

            <div class="form-group">
                <label>📍 Endereço</label>
                <input type="text" id="endereco" placeholder="Rua exemplo, 123">
            </div>

            <button class="btn btn-add" onclick="adicionar()">✅ Adicionar</button>
        </div>

        <div class="card">
            <h2>📋 Estabelecimentos Cadastrados</h2>
            <div id="lista"></div>
        </div>
    </div>

    <script>
        let estabelecimentos = [];
        let imagemBase64 = '';

        // Carregar ao iniciar
        window.onload = function() {
            const salvos = localStorage.getItem('estabelecimentos');
            if (salvos) {
                estabelecimentos = JSON.parse(salvos);
                renderizar();
            }
        };

        function previewImage() {
            const input = document.getElementById('foto');
            const preview = document.getElementById('imagePreview');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagemBase64 = e.target.result;
                    preview.innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function adicionar() {
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const email = document.getElementById('email').value;
            const endereco = document.getElementById('endereco').value;

            if (!nome) {
                alert('Digite o nome do estabelecimento!');
                return;
            }

            const novo = {
                id: Date.now(),
                foto: imagemBase64,
                nome,
                telefone,
                whatsapp,
                email,
                endereco
            };

            estabelecimentos.push(novo);
            localStorage.setItem('estabelecimentos', JSON.stringify(estabelecimentos));
            
            // Limpar
            document.getElementById('nome').value = '';
            document.getElementById('telefone').value = '';
            document.getElementById('whatsapp').value = '';
            document.getElementById('email').value = '';
            document.getElementById('endereco').value = '';
            document.getElementById('imagePreview').innerHTML = '<span>Clique para adicionar foto</span>';
            imagemBase64 = '';

            renderizar();
        }

        function excluir(id) {
            if (confirm('Excluir estabelecimento?')) {
                estabelecimentos = estabelecimentos.filter(e => e.id !== id);
                localStorage.setItem('estabelecimentos', JSON.stringify(estabelecimentos));
                renderizar();
            }
        }

        function renderizar() {
            const lista = document.getElementById('lista');
            
            if (estabelecimentos.length === 0) {
                lista.innerHTML = '<p style="color: #666; text-align: center;">Nenhum cadastrado</p>';
                return;
            }

            lista.innerHTML = estabelecimentos.map(est => `
                <div class="estabelecimento-item">
                    <img src="${est.foto || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23404040%22 width=%22100%22 height=%22100%22/><text fill=%22%23666666%22 x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2212%22>Sem foto</text></svg>'}">
                    <div class="estabelecimento-info">
                        <h3>${est.nome}</h3>
                        <p>${est.telefone || est.whatsapp}</p>
                    </div>
                    <button class="btn-excluir" onclick="excluir(${est.id})">🗑️</button>
                </div>
            `).join('');
        }

        renderizar();
    </script>
</body>
</html>
